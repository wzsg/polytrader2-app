name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows installer
    runs-on: windows-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8'));
          const expected = `v${pkg.version}`;
          const actual = process.env.GITHUB_REF_NAME;
          if (actual !== expected) {
            console.error(`Tag ${actual} does not match package version ${expected}`);
            process.exit(1);
          }
          NODE

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build renderer and main process
        run: pnpm run build

      - name: Build and publish Windows installer
        run: pnpm --filter @polytrader2/app run publish:win
