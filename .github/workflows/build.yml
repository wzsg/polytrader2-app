name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, lint, and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  release-windows:
    name: Release Windows artifact
    runs-on: windows-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set CI build version
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const packageJsonPath = 'apps/desktop/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          const [major, minor] = String(packageJson.version).split('.');
          const buildVersion = `${major}.${minor}.${process.env.GITHUB_RUN_NUMBER}`;
          packageJson.version = buildVersion;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `P2_CI_BUILD_VERSION=${buildVersion}\n`);
          console.log(`CI build version: ${buildVersion}`);
          NODE

      - name: Build renderer and main process
        run: pnpm run build

      - name: Build Windows installer
        run: pnpm --filter @polytrader2/app run dist:win:app

      - name: Upload Windows installer
        uses: actions/upload-artifact@v6
        with:
          name: polytrader2-windows-${{ env.P2_CI_BUILD_VERSION }}
          path: dist/Polytrader2-Setup-*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows installer to OVH S3
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.OVH_S3_REGION }}
          OVH_S3_ENDPOINT: ${{ secrets.OVH_S3_ENDPOINT }}
          OVH_S3_BUCKET: ${{ secrets.OVH_S3_BUCKET }}
          OVH_S3_PREFIX: ${{ secrets.OVH_S3_PREFIX }}
          OVH_S3_PUBLIC_BASE_URL: ${{ secrets.OVH_S3_PUBLIC_BASE_URL }}
          OVH_S3_ACL: ${{ secrets.OVH_S3_ACL }}
        run: |
          $ErrorActionPreference = 'Stop'

          $requiredSecrets = @{
            OVH_S3_ACCESS_KEY_ID = $env:AWS_ACCESS_KEY_ID
            OVH_S3_SECRET_ACCESS_KEY = $env:AWS_SECRET_ACCESS_KEY
            OVH_S3_REGION = $env:AWS_DEFAULT_REGION
            OVH_S3_ENDPOINT = $env:OVH_S3_ENDPOINT
            OVH_S3_BUCKET = $env:OVH_S3_BUCKET
          }

          $missingSecrets = @(
            $requiredSecrets.GetEnumerator() |
              Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } |
              ForEach-Object { $_.Key }
          )

          if ($missingSecrets.Count -gt 0) {
            throw ('Missing GitHub Actions secrets: {0}' -f ($missingSecrets -join ', '))
          }

          $prefix = $env:OVH_S3_PREFIX
          if ([string]::IsNullOrWhiteSpace($prefix)) {
            $prefix = 'polytrader2/windows'
          }
          $prefix = $prefix.Trim('/')

          $installer = Get-ChildItem -LiteralPath dist -Filter 'Polytrader2-Setup-*.exe' -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw 'No Polytrader2-Setup-*.exe installer found in dist.'
          }

          $hash = Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256
          $artifactKey = '{0}/releases/{1}/{2}' -f $prefix, $env:P2_CI_BUILD_VERSION, $installer.Name
          $manifestKey = '{0}/latest/windows-installer.json' -f $prefix
          $publicBaseUrl = $env:OVH_S3_PUBLIC_BASE_URL
          if ([string]::IsNullOrWhiteSpace($publicBaseUrl)) {
            $publicBaseUrl = ('{0}/{1}' -f $env:OVH_S3_ENDPOINT.TrimEnd('/'), $env:OVH_S3_BUCKET)
          }
          $publicBaseUrl = $publicBaseUrl.TrimEnd('/')
          $downloadUrl = '{0}/{1}' -f $publicBaseUrl, $artifactKey
          $manifestUrl = '{0}/{1}' -f $publicBaseUrl, $manifestKey

          aws --version
          $installerUploadArgs = @(
            's3',
            'cp',
            $installer.FullName,
            ('s3://{0}/{1}' -f $env:OVH_S3_BUCKET, $artifactKey),
            '--endpoint-url',
            $env:OVH_S3_ENDPOINT
          )

          if (-not [string]::IsNullOrWhiteSpace($env:OVH_S3_ACL)) {
            $installerUploadArgs += @('--acl', $env:OVH_S3_ACL)
          }

          aws @installerUploadArgs

          $manifest = [ordered]@{
            app = 'Polytrader2'
            platform = 'windows'
            version = $env:P2_CI_BUILD_VERSION
            fileName = $installer.Name
            size = $installer.Length
            sha256 = $hash.Hash
            bucket = $env:OVH_S3_BUCKET
            key = $artifactKey
            endpoint = $env:OVH_S3_ENDPOINT
            downloadUrl = $downloadUrl
            manifestUrl = $manifestUrl
            runId = $env:GITHUB_RUN_ID
            runNumber = $env:GITHUB_RUN_NUMBER
            headSha = $env:GITHUB_SHA
            uploadedAt = (Get-Date).ToUniversalTime().ToString('o')
          }

          $manifestPath = Join-Path $env:RUNNER_TEMP 'windows-installer.json'
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath $manifestPath -Encoding utf8

          $manifestUploadArgs = @(
            's3',
            'cp',
            $manifestPath,
            ('s3://{0}/{1}' -f $env:OVH_S3_BUCKET, $manifestKey),
            '--endpoint-url',
            $env:OVH_S3_ENDPOINT,
            '--content-type',
            'application/json'
          )

          if (-not [string]::IsNullOrWhiteSpace($env:OVH_S3_ACL)) {
            $manifestUploadArgs += @('--acl', $env:OVH_S3_ACL)
          }

          aws @manifestUploadArgs
