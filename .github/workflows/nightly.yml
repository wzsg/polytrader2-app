name: Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare nightly build
    runs-on: ubuntu-latest

    outputs:
      commit: ${{ steps.nightly-version.outputs.commit }}
      date: ${{ steps.nightly-version.outputs.date }}
      sha: ${{ steps.nightly-version.outputs.sha }}
      version: ${{ steps.nightly-version.outputs.version }}

    steps:
      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0

      - name: Set nightly version
        id: nightly-version
        shell: bash
        run: |
          base_version="$(node -p "require('./apps/desktop/package.json').version.replace(/[-+].*$/, '')")"
          if [[ ! "$base_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Base package version $base_version is not a valid release version" >&2
            exit 1
          fi
          commit="$(git rev-parse HEAD)"
          sha="$(git rev-parse --short=7 HEAD)"
          date="$(date -u '+%Y-%m-%d %H:%M UTC')"
          version="$base_version-nightly.$(date -u '+%Y%m%d%H%M').$sha"
          {
            echo "commit=$commit"
            echo "date=$date"
            echo "sha=$sha"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows nightly
    needs: prepare
    runs-on: windows-latest

    env:
      P2_ENABLE_ACCOUNT_DATA_SYNC: '0'
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout nightly commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm run audit:security

      - name: Set nightly package version
        shell: pwsh
        env:
          P2_NIGHTLY_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $packageJsonPath = 'apps/desktop/package.json'
          $packageJson = Get-Content $packageJsonPath -Raw | ConvertFrom-Json
          $packageJson.version = $env:P2_NIGHTLY_VERSION
          $packageJson | ConvertTo-Json -Depth 20 | Set-Content $packageJsonPath -Encoding utf8

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build renderer and main process
        run: pnpm run build

      - name: Build Windows installer
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          pnpm --filter @polytrader2/app run dist:win:app

      - name: Upload Windows nightly assets
        uses: actions/upload-artifact@v6
        with:
          name: windows-nightly-assets
          path: |
            dist/Polytrader2-Setup-${{ needs.prepare.outputs.version }}.exe
            dist/Polytrader2-Setup-${{ needs.prepare.outputs.version }}.exe.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS nightly
    needs: prepare
    runs-on: macos-14

    env:
      P2_ENABLE_ACCOUNT_DATA_SYNC: '0'
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      MACOS_NOTARY_API_KEY: ${{ secrets.MACOS_NOTARY_API_KEY }}
      MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
      MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
      P2_NIGHTLY_VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Checkout nightly commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit }}

      - name: Verify Apple Silicon runner
        shell: bash
        run: test "$(uname -m)" = 'arm64'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm run audit:security

      - name: Set nightly package version
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.P2_NIGHTLY_VERSION ?? '';
          if (!/^\d+\.\d+\.\d+-nightly\.\d{12}\.[0-9a-f]{7}$/.test(version)) {
            console.error(`Nightly version ${version} is not valid`);
            process.exit(1);
          }
          const packageJsonPath = 'apps/desktop/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build renderer and main process
        run: pnpm run build

      - name: Write notarization API key
        shell: bash
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_API_KEY_ID}.p8"
          printf '%s' "$MACOS_NOTARY_API_KEY" | base64 -D > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$MACOS_NOTARY_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$MACOS_NOTARY_ISSUER" >> "$GITHUB_ENV"

      - name: Build and notarize macOS installer
        run: pnpm --filter @polytrader2/app run dist:mac:notarized:app

      - name: Upload macOS nightly assets
        uses: actions/upload-artifact@v6
        with:
          name: macos-nightly-assets
          path: |
            dist/Polytrader2-${{ needs.prepare.outputs.version }}-mac-arm64.dmg
            dist/Polytrader2-${{ needs.prepare.outputs.version }}-mac-arm64.dmg.blockmap
            dist/Polytrader2-${{ needs.prepare.outputs.version }}-mac-arm64.zip
            dist/Polytrader2-${{ needs.prepare.outputs.version }}-mac-arm64.zip.blockmap
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

  finalize:
    name: Publish nightly branch
    needs: [prepare, build-windows, build-macos]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout successful nightly commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit }}
          fetch-depth: 0

      - name: Update nightly branch
        shell: bash
        run: git push origin HEAD:refs/heads/nightly

      - name: Write nightly summary
        env:
          P2_NIGHTLY_DATE: ${{ needs.prepare.outputs.date }}
          P2_NIGHTLY_SHA: ${{ needs.prepare.outputs.sha }}
          P2_NIGHTLY_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          printf '%s\n' \
            '## Nightly build published' \
            '' \
            '- Branch: nightly' \
            "- Version: $P2_NIGHTLY_VERSION" \
            "- Commit: $P2_NIGHTLY_SHA" \
            "- Built at: $P2_NIGHTLY_DATE" \
            '- Artifacts: windows-nightly-assets and macos-nightly-assets (retained for 14 days)' \
            >> "$GITHUB_STEP_SUMMARY"
