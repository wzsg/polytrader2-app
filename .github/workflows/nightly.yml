name: Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  nightly-windows:
    name: Build and publish Windows nightly
    runs-on: windows-latest

    outputs:
      commit: ${{ steps.nightly-version.outputs.commit }}
      date: ${{ steps.nightly-version.outputs.date }}
      sha: ${{ steps.nightly-version.outputs.sha }}
      version: ${{ steps.nightly-version.outputs.version }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set nightly package version
        id: nightly-version
        shell: pwsh
        run: |
          $packageJsonPath = 'apps/desktop/package.json'
          $packageJson = Get-Content $packageJsonPath -Raw | ConvertFrom-Json
          $baseVersion = [string]$packageJson.version
          $baseVersion = $baseVersion -replace '[-+].*$', ''
          if ($baseVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Base package version $baseVersion is not a valid release version"
          }

          $shortSha = git rev-parse --short=7 HEAD
          $commit = git rev-parse HEAD
          $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMddHHmm')
          $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm UTC')
          $version = "$baseVersion-nightly.$stamp.$shortSha"

          $packageJson.version = $version
          $packageJson | ConvertTo-Json -Depth 20 | Set-Content $packageJsonPath -Encoding utf8

          "P2_NIGHTLY_VERSION=$version" >> $env:GITHUB_ENV
          "P2_NIGHTLY_DATE=$date" >> $env:GITHUB_ENV
          "P2_NIGHTLY_SHA=$shortSha" >> $env:GITHUB_ENV
          "commit=$commit" >> $env:GITHUB_OUTPUT
          "date=$date" >> $env:GITHUB_OUTPUT
          "sha=$shortSha" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "Nightly version: $version"

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build renderer and main process
        run: pnpm run build

      - name: Build Windows installer
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }
          pnpm --filter @polytrader2/app run dist:win:app

      - name: Publish nightly prerelease
        shell: pwsh
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $releaseTag = 'nightly'
          $releaseTitle = 'nightly'
          $installer = Get-ChildItem dist -Filter "Polytrader2-Setup-$env:P2_NIGHTLY_VERSION.exe" | Select-Object -First 1
          $blockmap = Get-ChildItem dist -Filter "Polytrader2-Setup-$env:P2_NIGHTLY_VERSION.exe.blockmap" | Select-Object -First 1
          $latest = Get-ChildItem dist -Filter 'latest.yml' | Select-Object -First 1

          if (-not $installer) { throw 'Missing nightly installer asset' }
          if (-not $blockmap) { throw 'Missing nightly blockmap asset' }
          if (-not $latest) { throw 'Missing nightly latest.yml asset' }

          git tag -f $releaseTag HEAD
          git push origin "refs/tags/$releaseTag" --force

          $notes = @"
          Nightly build from develop.

          - Version: $env:P2_NIGHTLY_VERSION
          - Commit: $env:P2_NIGHTLY_SHA
          - Built at: $env:P2_NIGHTLY_DATE

          Nightly releases are for testing the latest development build and may be less stable than tagged releases.
          "@
          $notesPath = Join-Path $env:RUNNER_TEMP 'nightly-release-notes.md'
          $notes | Set-Content $notesPath -Encoding utf8

          $releaseExists = $true
          $releaseJson = gh api "repos/$repo/releases/tags/$releaseTag" 2>$null
          if ($LASTEXITCODE -ne 0) {
            $releaseExists = $false
          }

          if ($releaseExists) {
            $release = $releaseJson | ConvertFrom-Json
            foreach ($asset in $release.assets) {
              gh api "repos/$repo/releases/assets/$($asset.id)" -X DELETE
            }

            gh release edit $releaseTag `
              --repo $repo `
              --title $releaseTitle `
              --notes-file $notesPath `
              --prerelease

            gh release upload $releaseTag `
              $installer.FullName `
              $blockmap.FullName `
              $latest.FullName `
              --repo $repo
          } else {
            gh release create $releaseTag `
              $installer.FullName `
              $blockmap.FullName `
              $latest.FullName `
            --repo $repo `
            --title $releaseTitle `
            --notes-file $notesPath `
            --prerelease
          }

  nightly-macos:
    name: Build and publish macOS nightly
    needs: nightly-windows
    runs-on: macos-14

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      MACOS_NOTARY_API_KEY: ${{ secrets.MACOS_NOTARY_API_KEY }}
      MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
      MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
      P2_NIGHTLY_DATE: ${{ needs.nightly-windows.outputs.date }}
      P2_NIGHTLY_SHA: ${{ needs.nightly-windows.outputs.sha }}
      P2_NIGHTLY_VERSION: ${{ needs.nightly-windows.outputs.version }}

    steps:
      - name: Checkout nightly commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.nightly-windows.outputs.commit }}

      - name: Verify Apple Silicon runner
        shell: bash
        run: test "$(uname -m)" = 'arm64'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set nightly package version
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.P2_NIGHTLY_VERSION ?? '';
          if (!/^\d+\.\d+\.\d+-nightly\.\d{12}\.[0-9a-f]{7}$/.test(version)) {
            console.error(`Nightly version ${version} is not valid`);
            process.exit(1);
          }
          const packageJsonPath = 'apps/desktop/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build renderer and main process
        run: pnpm run build

      - name: Write notarization API key
        shell: bash
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_API_KEY_ID}.p8"
          printf '%s' "$MACOS_NOTARY_API_KEY" | base64 -D > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$MACOS_NOTARY_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$MACOS_NOTARY_ISSUER" >> "$GITHUB_ENV"

      - name: Build and notarize macOS installer
        run: pnpm --filter @polytrader2/app run dist:mac:notarized:app

      - name: Publish macOS nightly assets
        shell: bash
        run: |
          gh release upload nightly \
            "dist/Polytrader2-${P2_NIGHTLY_VERSION}-mac-arm64.dmg" \
            "dist/Polytrader2-${P2_NIGHTLY_VERSION}-mac-arm64.dmg.blockmap" \
            "dist/Polytrader2-${P2_NIGHTLY_VERSION}-mac-arm64.zip" \
            "dist/Polytrader2-${P2_NIGHTLY_VERSION}-mac-arm64.zip.blockmap" \
            dist/latest-mac.yml \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
