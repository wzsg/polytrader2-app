name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.release-version.outputs.version }}

    steps:
      - name: Set release version from tag
        id: release-version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not a valid release version tag" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag targets latest master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          master_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/master" --jq '.object.sha')"
          if [[ "$GITHUB_SHA" != "$master_sha" ]]; then
            echo "Release tag must target the latest master commit ${master_sha}; received ${GITHUB_SHA}" >&2
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --generate-notes --repo "$GITHUB_REPOSITORY"

  build-windows:
    name: Build and sign Windows installer
    needs: prepare
    runs-on: [self-hosted, Windows, X64, simplysign]
    timeout-minutes: 180
    concurrency:
      group: polytrader2-windows-simplysign
      cancel-in-progress: false

    permissions:
      contents: read

    env:
      P2_ENABLE_ACCOUNT_DATA_SYNC: '0'
      P2_WINDOWS_SIGNING_CERT_SHA1: 4039EA646010325F6795229BDD5274C892EC56AA
      P2_WINDOWS_SIGNING_TIMESTAMP_URL: http://time.certum.pl
      P2_WINDOWS_SIGNING_TIMEOUT_MS: 1800000
      P2_WINDOWS_SIGNING_RETRY_DELAY_MS: 15000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm run audit:security

      - name: Set package version
        shell: pwsh
        run: |
          $script = @'
          const fs = require('fs');
          const version = process.env.P2_RELEASE_VERSION ?? '';
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            console.error(`Release version ${version} is not valid`);
            process.exit(1);
          }
          const packageJsonPath = 'apps/desktop/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          '@
          $script | node
        env:
          P2_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Prepare Windows signing metrics
        shell: pwsh
        run: |
          $metricsPath = Join-Path $env:RUNNER_TEMP 'polytrader2-windows-sign-metrics.json'
          Remove-Item -LiteralPath $metricsPath -Force -ErrorAction SilentlyContinue
          "P2_WINDOWS_SIGN_METRICS_PATH=$metricsPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build renderer and main process
        run: pnpm run build

      - name: Build Windows installer
        run: pnpm --filter @polytrader2/app run dist:win:app

      - name: Verify Windows signatures
        shell: pwsh
        run: |
          $expectedThumbprint = $env:P2_WINDOWS_SIGNING_CERT_SHA1.ToUpperInvariant()
          $paths = @(
            "dist\Polytrader2-Setup-${{ needs.prepare.outputs.version }}.exe",
            'dist\win-unpacked\Polytrader2.exe',
            'dist\win-unpacked\resources\elevate.exe'
          )
          foreach ($path in $paths) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing signed Windows file: $path"
            }
            $signature = Get-AuthenticodeSignature -LiteralPath $path
            if ($signature.Status -ne 'Valid') {
              throw "Invalid Authenticode signature for ${path}: $($signature.Status)"
            }
            if ($signature.SignerCertificate.Thumbprint.ToUpperInvariant() -ne $expectedThumbprint) {
              throw "Unexpected signing certificate for $path"
            }
          }

      - name: Report Windows signing metrics
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath $env:P2_WINDOWS_SIGN_METRICS_PATH)) {
            Write-Host 'No Windows signing operations were recorded.'
            exit 0
          }
          $metrics = Get-Content -LiteralPath $env:P2_WINDOWS_SIGN_METRICS_PATH -Raw | ConvertFrom-Json
          $lines = @(
            '## Windows code signing',
            '',
            "- Requested files: $($metrics.requests)",
            "- Cache hits: $($metrics.cacheHits)",
            "- Successful cloud signatures: $($metrics.cloudSignatures)",
            "- SignTool attempts: $($metrics.signToolAttempts)",
            "- Authorization retries: $($metrics.authorizationRetries)"
          )
          $lines | ForEach-Object { Write-Host $_ }
          $lines | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v6
        with:
          name: windows-release-assets
          path: |
            dist/Polytrader2-Setup-${{ needs.prepare.outputs.version }}.exe
            dist/Polytrader2-Setup-${{ needs.prepare.outputs.version }}.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

  build-macos:
    name: Build macOS installer
    needs: prepare
    runs-on: macos-14

    env:
      P2_ENABLE_ACCOUNT_DATA_SYNC: '0'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      MACOS_NOTARY_API_KEY: ${{ secrets.MACOS_NOTARY_API_KEY }}
      MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
      MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Apple Silicon runner
        shell: bash
        run: test "$(uname -m)" = 'arm64'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm run audit:security

      - name: Set package version
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.P2_RELEASE_VERSION ?? '';
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            console.error(`Release version ${version} is not valid`);
            process.exit(1);
          }
          const packageJsonPath = 'apps/desktop/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE
        env:
          P2_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build renderer and main process
        run: pnpm run build

      - name: Write notarization API key
        shell: bash
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_API_KEY_ID}.p8"
          printf '%s' "$MACOS_NOTARY_API_KEY" | base64 -D > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$MACOS_NOTARY_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$MACOS_NOTARY_ISSUER" >> "$GITHUB_ENV"

      - name: Build and notarize macOS installer
        run: pnpm --filter @polytrader2/app run dist:mac:notarized:app

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v6
        with:
          name: macos-release-assets
          path: |
            dist/Polytrader2-${{ needs.prepare.outputs.version }}-mac-arm64.dmg
            dist/Polytrader2-${{ needs.prepare.outputs.version }}-mac-arm64.dmg.blockmap
            dist/Polytrader2-${{ needs.prepare.outputs.version }}-mac-arm64.zip
            dist/Polytrader2-${{ needs.prepare.outputs.version }}-mac-arm64.zip.blockmap
            dist/latest-mac.yml
          if-no-files-found: error

  finalize:
    name: Publish release
    needs: [prepare, build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            artifacts/* \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

      - name: Publish release as latest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --draft=false \
            --latest \
            --repo "$GITHUB_REPOSITORY"
